<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creator Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#080808;color:#f0ede8;font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#0f0f0f;border:1px solid #222;padding:52px;max-width:460px;width:100%;position:relative;}
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#c9a84c;}
  .tag{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:#c9a84c;margin-bottom:16px;}
  h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:300;margin-bottom:8px;}
  .sub{font-size:11px;color:#666;line-height:1.7;margin-bottom:36px;}
  .form-group{margin-bottom:20px;}
  label{display:block;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:#666;margin-bottom:8px;}
  input{width:100%;background:#141414;border:1px solid #222;color:#f0ede8;font-family:'DM Mono',monospace;font-size:13px;padding:12px 16px;outline:none;transition:border-color .2s;}
  input:focus{border-color:#c9a84c;}
  .btn{width:100%;background:#c9a84c;color:#080808;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:14px;border:none;cursor:pointer;font-weight:500;transition:all .2s;margin-top:8px;}
  .btn:hover{background:#e2c47e;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .result{margin-top:24px;padding:16px;font-size:12px;line-height:1.7;display:none;}
  .result.success{background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.3);color:#4caf50;}
  .result.error{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#e74c3c;}
  .warning{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);padding:14px;font-size:11px;color:#c9a84c;line-height:1.7;margin-bottom:28px;}
</style>
</head>
<body>
<div class="card">
  <div class="tag">One Time Setup</div>
  <h1>Create Creator Account</h1>
  <p class="sub">Use this page once to create your creator account. After that, log in normally on your website.</p>

  <div class="warning">
    ⚠ This page only works once. After a creator account exists, this form will be disabled automatically.
  </div>

  <div class="form-group">
    <label>Backend URL</label>
    <input type="text" id="backendUrl" value="https://vaulted-backend-production.up.railway.app"/>
  </div>

  <div class="form-group">
    <label>Setup Secret Key</label>
    <input type="password" id="setupKey" placeholder="tanya2024secret"/>
  </div>

  <div class="form-group">
    <label>Your Display Name</label>
    <input type="text" id="displayName" placeholder="Tanya"/>
  </div>

  <div class="form-group">
    <label>Your Email</label>
    <input type="email" id="email" placeholder="your@email.com"/>
  </div>

  <div class="form-group">
    <label>Your Password (min 8 characters)</label>
    <input type="password" id="password" placeholder="Choose a strong password"/>
  </div>

  <button class="btn" id="submitBtn" onclick="createCreator()">Create My Creator Account →</button>

  <div class="result" id="result"></div>
</div>

<script>
async function createCreator() {
  const btn = document.getElementById('submitBtn');
  const result = document.getElementById('result');
  const backendUrl = document.getElementById('backendUrl').value.trim().replace(/\/$/, '');
  const setupKey = document.getElementById('setupKey').value.trim();
  const displayName = document.getElementById('displayName').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  // Validate
  if (!setupKey || !displayName || !email || !password) {
    showResult('error', 'Please fill in all fields.');
    return;
  }
  if (password.length < 8) {
    showResult('error', 'Password must be at least 8 characters.');
    return;
  }

  btn.textContent = 'Creating...';
  btn.disabled = true;
  result.style.display = 'none';

  try {
    const res = await fetch(`${backendUrl}/api/auth/creator-setup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, displayName, setupKey }),
    });

    const data = await res.json();

    if (!res.ok) {
      showResult('error', data.error || 'Something went wrong.');
    } else {
      showResult('success', `
        ✅ Creator account created successfully!<br><br>
        <strong>Name:</strong> ${data.user.displayName}<br>
        <strong>Email:</strong> ${data.user.email}<br>
        <strong>Role:</strong> ${data.user.role}<br><br>
        You can now log in on your website with these credentials.<br>
        <strong>Delete this page after setup!</strong>
      `);
      btn.textContent = 'Done! ✓';
    }
  } catch (err) {
    showResult('error', 'Could not reach backend. Check your Backend URL and make sure Railway is running.');
  } finally {
    if (btn.textContent !== 'Done! ✓') {
      btn.textContent = 'Create My Creator Account →';
      btn.disabled = false;
    }
  }
}

function showResult(type, message) {
  const result = document.getElementById('result');
  result.className = `result ${type}`;
  result.innerHTML = message;
  result.style.display = 'block';
}
</script>
</body>
</html>
